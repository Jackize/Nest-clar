services:
  postgres-primary:
    image: postgres:16-alpine
    container_name: nestjs-clar-postgres-primary
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-nestjs_clar}
      POSTGRES_REPL_PASSWORD: ${POSTGRES_REPL_PASSWORD:-repl_password}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    command: >
      postgres
      -c wal_level=replica
      -c hot_standby=on
      -c max_wal_senders=10
      -c max_replication_slots=10
      -c hot_standby_feedback=on
    volumes:
      - postgres_primary_data:/var/lib/postgresql/data
      - ./docker/postgres/init-primary.sh:/docker-entrypoint-initdb.d/init-primary.sh:ro
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-nestjs_clar}",
        ]
      interval: 5s
      timeout: 5s
      retries: 5

  postgres-replica-1:
    image: postgres:16-alpine
    container_name: nestjs-clar-postgres-replica-1
    restart: unless-stopped
    depends_on:
      postgres-primary:
        condition: service_healthy
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_REPL_PASSWORD: ${POSTGRES_REPL_PASSWORD:-repl_password}
      REPLICA_SLOT: replication_slot_1
    ports:
      - "${POSTGRES_REPLICA_1_PORT:-5433}:5432"
    entrypoint: ["/docker-entrypoint-initdb.d/init-replica.sh"]
    volumes:
      - postgres_replica_1_data:/var/lib/postgresql/data
      - ./docker/postgres/init-replica.sh:/docker-entrypoint-initdb.d/init-replica.sh:ro

  postgres-replica-2:
    image: postgres:16-alpine
    container_name: nestjs-clar-postgres-replica-2
    restart: unless-stopped
    depends_on:
      postgres-primary:
        condition: service_healthy
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_REPL_PASSWORD: ${POSTGRES_REPL_PASSWORD:-repl_password}
      REPLICA_SLOT: replication_slot_2
    ports:
      - "${POSTGRES_REPLICA_2_PORT:-5434}:5432"
    entrypoint: ["/docker-entrypoint-initdb.d/init-replica.sh"]
    volumes:
      - postgres_replica_2_data:/var/lib/postgresql/data
      - ./docker/postgres/init-replica.sh:/docker-entrypoint-initdb.d/init-replica.sh:ro

  redis:
    image: redis:7-alpine
    container_name: nestjs-clar-redis
    restart: unless-stopped
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  postgres_primary_data:
  postgres_replica_1_data:
  postgres_replica_2_data:
  redis_data:
